# Configuration for the http server
server:
  # If TLS is not enabled, tip will listen on this port
  port: 6000
  tls:
    # Unless false TLS is enabled if 'cert' and 'key' are given
    enabled: true
    # Unless false port 80 is redirected to 443
    redirect_http: true
    # If true, TLS uses the port from server.port and no http is used. If
    # false, port 443 is used for TLS.
    use_custom_port: false
    # The TLS certificate file
    cert:
    # The TLS certificate key file
    key:

# Configuration for logging
logging:
  # The web server access logs
  access:
    # The directory where the log file should be placed
    dir: "/var/log/tip"
    # Indicates if tip should log additionally to stderr
    stderr: false
  # The tip internal logs
  internal:
    # The directory where the log file should be placed
    dir: "/var/log/tip"
    # Indicates if tip should log additionally to stderr
    stderr: false
    # The minimal log level that should be logged
    level: "error"
    # Configuration for 'smart' logging. If enabled internal logging is usually logged from the minimal log level as
    # usual, but if an error occurs a special error log is logged to a dedicated file that contains all log entries
    # (with all log levels, also levels that normally wouldn't be logged) for that particular request.
    smart:
      # If true smart logging is enabled
      enabled: true
      # The directory where the error log files are stored. If omitted it is equal to the normal internal logging dir
      dir: "/var/log/tip/errors"

# Configuration related to the TIP
tip:
  # The primary / linked issuer. The TIP has a direct relation to this issuer, i.e. TIP implements Remote Token
  # Introspection for this issuer
  linked_issuer:
    # The issuer url
    issuer_url: https://linked.issuer.com
    # The issuer's native introspection endpoint; TIP will replay requests for "local" tokens at this endpoint.
    native_introspection_endpoint: https://linked.issuer.com/internal/introspect
    # If true, TIP exposes a /.well-known/openid-configuration endpoint that proxies the linked issuer's
    # OpenID configuration, replacing the introspection_endpoint with TIP's public endpoint.
    # The metadata is cached for 1 hour.
    proxy_well_known: false
    # The public URL of TIP's introspection endpoint. Required if proxy_well_known is true.
    # This value replaces the introspection_endpoint in the proxied OpenID configuration.
    public_introspection_endpoint: https://tip.example.com/
  # Configuration of the fallback issuer that is used when the issuer of a token
  # cannot be determined;
  # If empty, {"active": false} is returned for such tokens.
  # If set, the introspection request will be replayed at this fallback issuer.
  # Same format as a single issuer in remote_issuers
  fallback_issuer_unknown_token_issuer:
  # Configuration of the fallback issuer that is used when the issuer of a token
  # can be determined but is not in the list of remote_issuers;
  # If empty, {"active": false} is returned for such tokens.
  # If set, the introspection request will be replayed at this fallback issuer.
  # Same format as a single issuer in remote_issuers
  fallback_issuer_unsupported_token_issuer:
  # Configuration of remote issuers; those are issuers with whom TIP has a trust relationship and will use for
  # remotely inspecting tokens
  remote_issuers:
      # The issuer  url of the remote issuer
    - issuer_url: https://issuer.example.com
#      The url of the introspection endpoint; this is optional; if not provided it will be dynamically discovered
#      introspection_endpoint: https://issuer.example.com/introspect
      # The client id registered for TIP
      client_id: client_id
      # The client secret registered for TIP
      client_secret: client_secret
      # A mapping for renaming claims; The key is the claim name at the remote issuer; the value is the renamed claim
      # name return from TIP
      claim_renaming:
        weird_groups: groups
        user_id: username
      # claim_mapping allows to map claim values from the remote issuer to other values. This is only supported for
      # claims where the value is either a single string or an array of strings and those must be configured separately.
      # If a claim is also renamed in claim_renaming the original claim name must be used, not the renamed one.
      claim_mapping:
        # claim mapping for claims with single string values
        # The following format must be used: Keys under 'strings' are claim names. For each claim name there is a
        # simple string to string mapping, from the old claim value to the new claim value
        strings:
          sub:
            one-sub: other-sub
        # claim mapping for claims with string array values
        # The following format must be used: Keys under 'string_arrays' are claim names. For each claim name there is a
        # mapping from a single (old) string to a list of (new) strings. If the old claim occurs in the claim value
        # array it will be replaced with the passed list of values. This way it is possible to map a single value
        # e.g. entitlement to multiple new entitlements; it is currently not possible to translate multiple values
        # into a single one
        string_arrays:
          entitlements:
            hpc:
              - compute
          weird_groups:
            all-users:
              - users
            special-users:
              - admins
              - dev

  # Configuration for OpenID Federation support (optional)
  # When enabled, TIP publishes its entity configuration at /.well-known/openid-federation
  federation:
    # Required: The unique identifier for this TIP instance in the federation
    entity_id: https://tip.example.org
    
    # Required: List of trust anchors that TIP trusts
    # Each trust anchor is identified by its entity ID
    trust_anchors:
      - entity_id: https://ta.oidfed.example.org
    
    # Optional: Authority hints point to intermediate entities that can help build trust chains
    authority_hints:
      - https://intermediate.example.org
    
    # Required: Directory where signing keys are stored
    # Keys are automatically generated if generate_keys is true
    key_dir: /etc/tip/keys
    
    # Federation signing configuration (for entity statements)
    # Uses a single algorithm for signing entity configuration statements
    federation:
      # Single signing algorithm for federation entity statements (default: ES512)
      # This must be exactly one algorithm
      alg: ES512
      # Optional: RSA key length when using RSA algorithms (default: 2048)
      rsa_key_len: 2048
      # Optional: Whether to automatically generate keys if they don't exist (default: true)
      generate_keys: true
      # Optional: Automatic key rotation configuration
      automatic_key_rollover:
        # Enable automatic key rotation (default: false)
        enabled: false
        # Interval between key rotations in seconds (default: 86400 = 24 hours)
        interval: 86400
        # Overlap period in seconds during which both old and new keys are valid (default: 3600 = 1 hour)
        overlap: 3600
    
    # OIDC signing configuration (for general JWT operations)
    # Supports multiple algorithms for flexibility
    oidc:
      # List of supported signing algorithms (default: [ES512])
      # Multiple algorithms can be listed for flexibility
      algs:
        - ES512
        - RS256
      # Optional: RSA key length when using RSA algorithms (default: 2048)
      rsa_key_len: 2048
      # Optional: Whether to automatically generate keys if they don't exist (default: true)
      generate_keys: true
      # Optional: Automatic key rotation configuration (same as federation)
      automatic_key_rollover:
        enabled: false
        interval: 86400
        overlap: 3600
    
    # Optional: Entity configuration lifetime in seconds (default: 86400 = 24 hours)
    # How long the entity configuration JWT is valid
    configuration_lifetime: 86400
    
    # OAuth Protected Resource metadata (all optional)

    # Human-readable name for this resource
    resource_name: "TIP - Token Introspection Proxy"
    
    # URL with documentation about this resource
    resource_documentation: https://docs.example.org/tip
    
    # Common federation metadata (all optional)
    
    # Display name for this entity
    display_name: "TIP Service"
    
    # Description of this entity
    description: "Token Introspection Proxy for federated identity"
    
    # Keywords for discovery
    keywords:
      - oauth
      - introspection
      - federation
    
    # Contact email addresses
    contacts:
      - admin@example.org
    
    # URL to logo image
    logo_uri: https://tip.example.org/logo.png
    
    # URL to policy document
    policy_uri: https://example.org/privacy
    
    # URL to information page
    information_uri: https://example.org/info
    
    # Organization name
    organization_name: "Example Organization"
    
    # Organization URL
    organization_uri: https://example.org
    
    # Extra metadata to include in the protected resource metadata
    extra_pr_metadata: {}
    
    # Extra metadata to include in the federation entity metadata
    extra_fe_metadata: {}
    
    # Extra data to include in the entity configuration JWT
    extra_entity_configuration_data:
      tip_version: "1.0.0"
    
    # If true, copies common informational claims (like contacts, organization_name, etc.)
    # from the protected resource metadata to the federation entity metadata
    publish_informational_claims_in_federation_entity: true
